## in linux/WSL export JWT_SECRET=very-long-random-key
## in powershell setx JWT_SECRET "very-long-random-key" and access it as jwt.secret=${JWT_SECRET} 
jwt:
  secret: veryverysecuresecretkey1234567890  # set as an environment variable
